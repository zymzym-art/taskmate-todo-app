<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMate - To-Do App</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 15px;
      transition: 0.4s ease;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 35px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      color: white;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .app-title {
      font-size: 2rem;
      font-weight: 700;
    }

    .app-title span {
      color: #38bdf8;
    }

    .theme-btn {
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 1.2rem;
      transition: 0.3s ease;
    }

    .theme-btn:hover {
      transform: scale(1.08);
      background: #38bdf8;
    }

    .hero-card {
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      border-radius: 25px;
      padding: 30px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      top: -80px;
      right: -80px;
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .hero-subtitle {
      opacity: 0.9;
      position: relative;
      z-index: 2;
    }

    .task-input-container {
      margin-top: 25px;
      position: relative;
      z-index: 2;
    }

    .task-input {
      height: 60px;
      border-radius: 18px;
      border: none;
      padding-left: 20px;
      font-size: 1rem;
      outline: none;
    }

    .add-btn {
      height: 60px;
      border-radius: 18px;
      border: none;
      background: #0f172a;
      color: white;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .add-btn:hover {
      background: #020617;
      transform: translateY(-2px);
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 25px;
      transition: 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.12);
    }

    .stat-icon {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .icon-total {
      background: rgba(56, 189, 248, 0.2);
      color: #38bdf8;
    }

    .icon-completed {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .icon-pending {
      background: rgba(251, 191, 36, 0.2);
      color: #fbbf24;
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .filter-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .filter-btn {
      border: none;
      padding: 12px 22px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      color: white;
      transition: 0.3s ease;
      font-weight: 500;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #38bdf8;
      color: white;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .task-card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s ease;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .task-card:hover {
      transform: translateX(5px);
      background: rgba(255,255,255,0.12);
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .check-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #38bdf8;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .check-btn.completed {
      background: #38bdf8;
      color: white;
    }

    .task-text {
      font-size: 1rem;
      font-weight: 500;
    }

    .task-text.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .task-date {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 5px;
    }

    .task-actions {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      transition: 0.3s ease;
    }

    .delete-btn:hover {
      background: #ef4444;
    }

    .edit-btn:hover {
      background: #22c55e;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      opacity: 0.7;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    /* Light Mode */
    body.light-mode {
      background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f8fafc);
    }

    body.light-mode .app-container {
      background: rgba(255,255,255,0.8);
      color: #0f172a;
    }

    body.light-mode .task-card,
    body.light-mode .stat-card,
    body.light-mode .filter-btn,
    body.light-mode .theme-btn,
    body.light-mode .action-btn {
      background: rgba(15, 23, 42, 0.05);
      color: #0f172a;
    }

    body.light-mode .filter-btn.active {
      background: #2563eb;
      color: white;
    }

    body.light-mode .task-input {
      background: white;
      color: black;
    }

    body.light-mode .add-btn {
      background: #2563eb;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app-container {
      animation: fadeUp 0.6s ease;
    }

    .hero-card {
      animation: fadeUp 0.8s ease;
    }

    .stat-card {
      animation: fadeUp 1s ease;
    }

    .task-card {
      animation: fadeUp 0.4s ease;
    }

    .task-input:focus {
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.3);
      transform: scale(1.01);
      transition: 0.3s ease;
    }

    .add-btn:active,
    .filter-btn:active,
    .theme-btn:active,
    .action-btn:active {
      transform: scale(0.95);
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 5px;
      height: 100%;
      background: #38bdf8;
      border-radius: 20px 0 0 20px;
      opacity: 0;
      transition: 0.3s ease;
    }

    .task-card {
      position: relative;
      overflow: hidden;
    }

    .task-card:hover::before {
      opacity: 1;
    }

    .scrollbar-style::-webkit-scrollbar {
      width: 10px;
    }

    .scrollbar-style::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    .scrollbar-style::-webkit-scrollbar-thumb {
      background: #38bdf8;
      border-radius: 10px;
    }

    .task-list {
      max-height: 500px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .task-list::-webkit-scrollbar {
      width: 8px;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: rgba(56, 189, 248, 0.5);
      border-radius: 10px;
    }

    .task-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .hero-subtitle,
    .task-date {
      letter-spacing: 0.3px;
    }

    .task-text {
      word-break: break-word;
    }

    .stat-card:hover .stat-icon {
      transform: rotate(8deg) scale(1.1);
      transition: 0.3s ease;
    }

    .check-btn:hover {
      transform: scale(1.1);
      background: rgba(56, 189, 248, 0.2);
    }

    .completed {
      transition: 0.3s ease;
    }

    body.light-mode .hero-card {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
    }

    body.light-mode .task-card:hover,
    body.light-mode .stat-card:hover {
      background: rgba(255,255,255,0.95);
    }

    body.light-mode .theme-btn:hover {
      background: #2563eb;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        padding: 15px 10px;
        align-items: flex-start;
      }

      .app-container {
        padding: 20px 15px;
        border-radius: 20px;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .app-title {
        font-size: 1.7rem;
      }

      .hero-card {
        padding: 22px;
        border-radius: 20px;
      }

      .hero-title {
        font-size: 1.4rem;
        line-height: 1.4;
      }

      .hero-subtitle {
        font-size: 0.9rem;
      }

      .task-input {
        height: 55px;
        font-size: 0.95rem;
      }

      .add-btn {
        height: 55px;
        font-size: 0.95rem;
      }

      .stats-container {
        grid-template-columns: 1fr;
      }

      .stat-card {
        padding: 20px;
      }

      .filter-buttons {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 5px;
      }

      .filter-buttons::-webkit-scrollbar {
        display: none;
      }

      .filter-btn {
        white-space: nowrap;
        padding: 10px 18px;
        font-size: 0.9rem;
      }

      .task-list {
        max-height: unset;
        overflow-y: visible;
      }

      .task-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        padding: 18px;
      }

      .task-left {
        width: 100%;
        align-items: flex-start;
      }

      .task-text {
        font-size: 0.95rem;
      }

      .task-date {
        font-size: 0.8rem;
      }

      .task-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .action-btn {
        width: 38px;
        height: 38px;
      }

      .theme-btn {
        width: 45px;
        height: 45px;
      }

      .empty-state {
        padding: 30px 10px;
      }
    }

    @media (max-width: 480px) {
      .app-title {
        font-size: 1.5rem;
      }

      .hero-title {
        font-size: 1.2rem;
      }

      .hero-card {
        padding: 18px;
      }

      .task-card {
        padding: 15px;
      }

      .stat-number {
        font-size: 1.5rem;
      }

      .task-input,
      .add-btn {
        border-radius: 14px;
      }
    }

    /* Modal Styles */
    #editModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      color: #0f172a;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    #editInput {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 20px;
      color: #0f172a;
      transition: border-color 0.3s ease;
    }

    #editInput:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    #confirmEditBtn {
      background: #38bdf8;
      color: white;
    }

    #confirmEditBtn:hover {
      background: #0ea5e9;
      transform: scale(1.02);
    }

    #cancelEditBtn {
      background: #e2e8f0;
      color: #0f172a;
    }

    #cancelEditBtn:hover {
      background: #cbd5e1;
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <div class="app-container">

    <div class="top-bar">
      <h1 class="app-title">Task<span>Mate</span></h1>

      <button class="theme-btn" id="themeToggle">
        <i class="bi bi-moon-stars-fill"></i>
      </button>
    </div>

    <div class="hero-card">
      <h2 class="hero-title">Stay Organized & Productive</h2>
      <p class="hero-subtitle">
        Manage your daily tasks efficiently with TaskMate.
      </p>

      <div class="row g-3 task-input-container">
        <div class="col-md-9">
          <input
            type="text"
            class="form-control task-input"
            placeholder="Enter your task here..."
            id="taskInput"
          >
        </div>

        <div class="col-md-3 d-grid">
          <button class="add-btn" id="addTaskBtn">
            <i class="bi bi-plus-lg"></i> Add Task
          </button>
        </div>
      </div>
    </div>

    <div class="stats-container">

      <div class="stat-card">
        <div class="stat-icon icon-total">
          <i class="bi bi-list-task"></i>
        </div>

        <div class="stat-number" id="totalTasks">0</div>
        <div>Total Tasks</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-completed">
          <i class="bi bi-check-circle-fill"></i>
        </div>

        <div class="stat-number" id="completedTasks">0</div>
        <div>Completed</div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-pending">
          <i class="bi bi-clock-fill"></i>
        </div>

        <div class="stat-number" id="pendingTasks">0</div>
        <div>Pending</div>
      </div>

    </div>

    <div class="filter-buttons">
      <button class="filter-btn active">All</button>
      <button class="filter-btn">Completed</button>
      <button class="filter-btn">Pending</button>
    </div>

    <div class="task-list">


     

      <div class="empty-state d-none">
        <i class="bi bi-inboxes-fill"></i>
        <h4>No tasks yet</h4>
        <p>Add your first task to get started.</p>
      </div>

    </div>

  </div>

  <!-- Edit Modal -->
  <div id="editModal">
    <div class="modal-content">
      <div class="modal-header">Edit Task</div>
      <input type="text" id="editInput" placeholder="Enter new task text...">
      <div class="modal-buttons">
        <button class="modal-btn" id="cancelEditBtn">Cancel</button>
        <button class="modal-btn" id="confirmEditBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const taskList = document.querySelector('.task-list');
    const emptyState = document.querySelector('.empty-state');
    const totalTasks = document.getElementById('totalTasks');
    const completedTasks = document.getElementById('completedTasks');
    const pendingTasks = document.getElementById('pendingTasks');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const themeToggle = document.getElementById('themeToggle');

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let currentFilter = 'All';

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function showNotification(message) {
      const notification = document.createElement('div');

      notification.className = 'position-fixed top-0 end-0 m-4 px-4 py-3 rounded-4 shadow';
      notification.style.zIndex = '9999';
      notification.style.background = '#38bdf8';
      notification.style.color = 'white';
      notification.style.fontWeight = '600';

      notification.innerHTML = `
        <i class="bi bi-check-circle-fill me-2"></i>${message}
      `;

      document.body.appendChild(notification);

      setTimeout(() => {
        notification.remove();
      }, 2500);
    }

    function updateStats() {
      totalTasks.textContent = tasks.length;
      completedTasks.textContent = tasks.filter(task => task.completed).length;
      pendingTasks.textContent = tasks.filter(task => !task.completed).length;
    }

    function renderTasks() {
      document.querySelectorAll('.generated-task').forEach(task => {
        task.remove();
      });

      let filteredTasks = [...tasks];

      if (currentFilter === 'Completed') {
        filteredTasks = filteredTasks.filter(task => task.completed);
      }

      if (currentFilter === 'Pending') {
        filteredTasks = filteredTasks.filter(task => !task.completed);
      }

      if (filteredTasks.length === 0) {
        emptyState.classList.remove('d-none');
      } else {
        emptyState.classList.add('d-none');
      }

      filteredTasks.forEach(task => {
        const taskCard = document.createElement('div');
        taskCard.classList.add('task-card', 'generated-task');

        taskCard.innerHTML = `
          <div class="task-left">
            <div class="check-btn ${task.completed ? 'completed' : ''}" data-id="${task.id}">
              ${task.completed ? '<i class="bi bi-check-lg"></i>' : ''}
            </div>

            <div>
              <div class="task-text ${task.completed ? 'completed' : ''}">
                ${task.text}
              </div>

              <div class="task-date">
                ${task.date}
              </div>
            </div>
          </div>

          <div class="task-actions">
            <button class="action-btn edit-btn" data-edit="${task.id}">
              <i class="bi bi-pencil-fill"></i>
            </button>

            <button class="action-btn delete-btn" data-delete="${task.id}">
              <i class="bi bi-trash-fill"></i>
            </button>
          </div>
        `;

        taskList.insertBefore(taskCard, emptyState);
      });

      addTaskEvents();
      updateStats();
      saveTasks();
    }

    function addTask() {
      const taskText = taskInput.value.trim();

      if (taskText === '') {
        alert('Please enter a task.');
        return;
      }

      const task = {
        id: Date.now(),
        text: taskText,
        completed: false,
        date: 'Added today'
      };

      tasks.unshift(task);
      taskInput.value = '';

      renderTasks();
      showNotification('Task added successfully!');
    }

    function toggleTask(id) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return {
            ...task,
            completed: !task.completed
          };
        }

        return task;
      });

      renderTasks();
    }

    function deleteTask(id) {
      const confirmDelete = confirm('Are you sure you want to delete this task?');

      if (!confirmDelete) {
        return;
      }

      tasks = tasks.filter(task => task.id !== id);

      renderTasks();
      showNotification('Task deleted successfully!');
    }

    function editTask(id) {
      const task = tasks.find(task => task.id === id);
      
      const modal = document.getElementById('editModal');
      const editInput = document.getElementById('editInput');
      const confirmBtn = document.getElementById('confirmEditBtn');
      const cancelBtn = document.getElementById('cancelEditBtn');
      
      editInput.value = task.text;
      modal.style.display = 'flex';
      editInput.focus();
      editInput.select();
      
      const handleConfirm = () => {
        const updatedText = editInput.value.trim();
        if (updatedText !== '') {
          task.text = updatedText;
          renderTasks();
          showNotification('Task updated successfully!');
        }
        closeEditModal();
      };
      
      const closeEditModal = () => {
        modal.style.display = 'none';
        confirmBtn.removeEventListener('click', handleConfirm);
        cancelBtn.removeEventListener('click', closeEditModal);
        document.removeEventListener('keydown', handleKeyPress);
      };
      
      const handleKeyPress = (e) => {
        if (e.key === 'Enter') handleConfirm();
        if (e.key === 'Escape') closeEditModal();
      };
      
      confirmBtn.addEventListener('click', handleConfirm);
      cancelBtn.addEventListener('click', closeEditModal);
      document.addEventListener('keydown', handleKeyPress);
      
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeEditModal();
      });
    }

    function addTaskEvents() {
      document.querySelectorAll('.check-btn').forEach(button => {
        button.addEventListener('click', () => {
          const id = Number(button.dataset.id);
          toggleTask(id);
        });
      });

      document.querySelectorAll('[data-delete]').forEach(button => {
        button.addEventListener('click', () => {
          const id = Number(button.dataset.delete);
          deleteTask(id);
        });
      });

      document.querySelectorAll('[data-edit]').forEach(button => {
        button.addEventListener('click', () => {
          const id = Number(button.dataset.edit);
          editTask(id);
        });
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        filterButtons.forEach(btn => btn.classList.remove('active'));

        button.classList.add('active');
        currentFilter = button.textContent;

        renderTasks();
      });
    });

    addTaskBtn.addEventListener('click', addTask);

    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTask();
      }
    });

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');

      const icon = themeToggle.querySelector('i');

      if (document.body.classList.contains('light-mode')) {
        icon.classList.remove('bi-moon-stars-fill');
        icon.classList.add('bi-brightness-high-fill');
      } else {
        icon.classList.remove('bi-brightness-high-fill');
        icon.classList.add('bi-moon-stars-fill');
      }
    });

    renderTasks();
  </script>

</body>
</html>
